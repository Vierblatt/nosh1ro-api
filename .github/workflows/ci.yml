name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test
        run: go test ./... -race -shuffle=on -count=1 -coverprofile=coverage.out

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/api/
